name: Daily Stock Scanner

on:
  schedule:
    - cron: '30 10 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scan Script
        env:
          # ตรวจสอบชื่อ Secret ใน GitHub ให้ตรงกับที่พิมพ์ตรงนี้
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          # เพิ่มการเช็คว่ามีไฟล์หรือค่านี้จริงๆ ก่อนรัน
          python -c "import os; print('Secret check:', 'Exists' if 'GOOGLE_APPLICATION_CREDENTIALS' in os.environ else 'Missing')"
          python "App 15.py"
